<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>KiraKira Draw</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--pk:#FF6B9D;--pkl:#FFB3D0;--pkp:#FFF0F5;--pu:#C084FC;--pul:#E0BBFF;--bl:#7DD3FC}
html,body{width:100%;height:100%;overflow:hidden;font-family:'M PLUS Rounded 1c',sans-serif;background:#FFF5F9}
#app{width:100%;height:100%;display:flex;flex-direction:column}

#topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;background:rgba(255,255,255,.95);border-bottom:2px solid var(--pkl);min-height:48px;flex-shrink:0;z-index:10}
.title{font-weight:900;font-size:15px;background:linear-gradient(135deg,var(--pk),var(--pu),var(--bl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.acts{display:flex;gap:3px}
.ib{width:36px;height:36px;border-radius:10px;border:2px solid var(--pkl);background:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer}
.ib:active{transform:scale(.9);background:var(--pkp)}
.ib.dng{border-color:#fca5a5}

#canvas-wrap{flex:1;position:relative;overflow:hidden;background:#fff;touch-action:none}
#canvas-wrap canvas{position:absolute;top:0;left:0;touch-action:none}
#mainCanvas{z-index:2}
#bgCanvas{z-index:1}
#prevCanvas{z-index:3;pointer-events:none}

#toolbar{background:rgba(255,255,255,.95);border-top:2px solid var(--pkl);padding:4px 6px 8px;flex-shrink:0;z-index:10;display:flex;flex-direction:column;gap:4px}

.trow{display:flex;gap:3px;overflow-x:auto;padding:2px 0;scrollbar-width:none;touch-action:pan-x;-webkit-overflow-scrolling:touch}
.trow::-webkit-scrollbar{display:none}
.tb{min-width:42px;height:42px;border-radius:10px;border:2px solid transparent;background:var(--pkp);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:18px;cursor:pointer;padding:2px 4px;flex-shrink:0}
.tb span{font-size:7px;font-weight:700;color:var(--pk);line-height:1}
.tb.on{border-color:var(--pk);background:#fff;box-shadow:0 0 0 2px rgba(255,107,157,.2)}
.tb:active{transform:scale(.92)}
.sep{width:2px;height:24px;background:var(--pkl);flex-shrink:0;margin:0 1px;align-self:center}

/* ======= SLIDER ======= */
.srow{display:flex;gap:6px;align-items:center;padding:0 2px}
.sgrp{flex:1;display:flex;align-items:center;gap:4px}
.sgrp>span:first-child{font-size:16px}
.sbar{flex:1;position:relative;height:48px;touch-action:none;-webkit-user-select:none;user-select:none}
.sbar .rail{position:absolute;left:0;right:0;top:50%;height:10px;transform:translateY(-50%);border-radius:5px;background:linear-gradient(90deg,var(--pkl),var(--pul))}
.sbar .fill{position:absolute;left:0;top:50%;height:10px;transform:translateY(-50%);border-radius:5px;background:linear-gradient(90deg,var(--pk),var(--pu));width:0%;pointer-events:none}
.sbar .knob{position:absolute;top:50%;left:0%;width:40px;height:40px;border-radius:50%;background:#fff;border:3px solid var(--pk);box-shadow:0 2px 10px rgba(255,107,157,.3);transform:translate(-50%,-50%);pointer-events:none}
.sbar.act .knob{border-color:var(--pu);box-shadow:0 4px 16px rgba(192,132,252,.4)}
.sval{font-size:11px;font-weight:700;color:var(--pk);min-width:28px;text-align:center}

.crow{display:flex;gap:3px;overflow-x:auto;scrollbar-width:none;padding:2px 0;touch-action:pan-x;-webkit-overflow-scrolling:touch}
.crow::-webkit-scrollbar{display:none}
.cw{width:28px;height:28px;border-radius:50%;border:3px solid transparent;cursor:pointer;flex-shrink:0}
.cw.on{border-color:var(--pk);transform:scale(1.15);box-shadow:0 0 0 2px rgba(255,107,157,.3)}
.cpk{width:28px;height:28px;border-radius:50%;border:2px dashed var(--pkl);overflow:hidden;flex-shrink:0;position:relative}
.cpk input{position:absolute;inset:-10px;width:calc(100% + 20px);height:calc(100% + 20px);border:none;padding:0;cursor:pointer}

/* PANELS */
.ov{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.3);display:none;align-items:flex-end;justify-content:center}
.ov.show{display:flex}
.pan{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:70vh;padding:16px;overflow-y:auto;box-shadow:0 -4px 20px rgba(0,0,0,.1);animation:pup .25s ease}
@keyframes pup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.panh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid var(--pkl)}
.pant{font-weight:900;font-size:17px;color:var(--pk)}
.panx{width:30px;height:30px;border-radius:50%;border:none;background:var(--pkp);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
.si{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:28px;border-radius:10px;background:var(--pkp);cursor:pointer}
.si:active{transform:scale(.85);background:var(--pkl)}
.scat{font-weight:700;font-size:12px;color:var(--pu);margin:10px 0 4px}
.bgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.bri{padding:10px;border-radius:10px;border:2px solid transparent;background:var(--pkp);text-align:center;cursor:pointer}
.bri.on{border-color:var(--pk);background:#fff}
.bri .be{font-size:24px;display:block;margin-bottom:2px}
.bri .bn{font-size:10px;font-weight:700;color:#666}
.hgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.hi{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:24px;border-radius:10px;border:2px solid transparent;background:var(--pkp);cursor:pointer}
.hi.on{border-color:var(--pk);background:#fff}
.hi span{font-size:8px;font-weight:700;color:#666}
.tgw{display:flex;align-items:center;gap:6px;padding:4px 0}
.tgw label{font-size:12px;font-weight:700;color:#666}
.tgs{width:40px;height:22px;border-radius:11px;background:var(--pkl);position:relative;cursor:pointer}
.tgs.on{background:var(--pk)}
.tgs::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.15);transition:left .15s}
.tgs.on::after{left:20px}
.li{display:flex;align-items:center;gap:6px;padding:6px;border-radius:10px;margin-bottom:3px;border:2px solid transparent;cursor:pointer}
.li.on{border-color:var(--pk);background:var(--pkp)}
.lt canvas{width:44px;height:32px;border-radius:6px;border:1px solid #eee}
.lbtns{display:flex;gap:3px}
.lbtns button{width:26px;height:26px;border-radius:6px;border:1px solid #eee;background:#fff;font-size:13px;cursor:pointer}
.addl{width:100%;padding:8px;border-radius:10px;border:2px dashed var(--pkl);background:var(--pkp);font-family:inherit;font-weight:700;font-size:13px;color:var(--pk);cursor:pointer;margin-top:6px}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#fff;border:2px solid var(--pk);border-radius:16px;padding:8px 16px;font-weight:700;font-size:13px;color:var(--pk);box-shadow:0 4px 16px rgba(255,107,157,.2);z-index:9999;pointer-events:none;animation:tin .2s,tout .2s 1.2s forwards}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(-16px)}}
@keyframes tout{to{opacity:0;transform:translateX(-50%) translateY(-16px)}}
@supports(padding:max(0px)){#topbar{padding-top:max(6px,env(safe-area-inset-top))}#toolbar{padding-bottom:max(8px,env(safe-area-inset-bottom))}}
</style>
</head>
<body>
<div id="app">
<div id="topbar">
  <div class="title">✨ KiraKira Draw 🎨</div>
  <div class="acts">
    <button class="ib" id="bUndo">↩️</button>
    <button class="ib" id="bRedo">↪️</button>
    <button class="ib" id="bLay">📚</button>
    <button class="ib" id="bStk">🎀</button>
    <button class="ib" id="bBrs">🖌️</button>
    <button class="ib" id="bSav">💾</button>
    <button class="ib dng" id="bClr">🗑️</button>
  </div>
</div>
<div id="canvas-wrap">
  <canvas id="bgCanvas"></canvas>
  <canvas id="mainCanvas"></canvas>
  <canvas id="prevCanvas"></canvas>
</div>
<div id="toolbar">
  <div class="trow" id="toolRow"></div>
  <div class="srow">
    <div class="sgrp"><span>🖊️</span>
      <div class="sbar" id="szBar"><div class="rail"></div><div class="fill"></div><div class="knob"></div></div>
      <span class="sval" id="szV">5</span>
    </div>
    <div class="sgrp"><span>💧</span>
      <div class="sbar" id="opBar"><div class="rail"></div><div class="fill"></div><div class="knob"></div></div>
      <span class="sval" id="opV">100%</span>
    </div>
  </div>
  <div class="crow" id="cRow"></div>
</div>
</div>

<div class="ov" id="pLay"><div class="pan"><div class="panh"><div class="pant">📚 レイヤー</div><button class="panx" id="xLay">✕</button></div><div id="lList"></div><button class="addl" id="aLay">＋ レイヤーを追加</button></div></div>
<div class="ov" id="pStk"><div class="pan"><div class="panh"><div class="pant">🎀 スタンプ</div><button class="panx" id="xStk">✕</button></div><div id="stkBody"></div></div></div>
<div class="ov" id="pBrs"><div class="pan"><div class="panh"><div class="pant">🖌️ ブラシ設定</div><button class="panx" id="xBrs">✕</button></div><div class="bgrid" id="brGrid"></div><div style="margin-top:10px"><div class="tgw"><label>手ブレ補正</label><div class="tgs" id="tStab"></div></div><div class="tgw"><label>筆圧感知</label><div class="tgs on" id="tPres"></div></div></div></div></div>
<div class="ov" id="pShp"><div class="pan"><div class="panh"><div class="pant">🔷 図形</div><button class="panx" id="xShp">✕</button></div><div class="hgrid" id="shGrid"></div><div class="tgw" style="margin-top:10px"><label>塗りつぶし</label><div class="tgs" id="tFill"></div></div></div></div>

<script>
const S={tool:'pen',col:'#333333',sz:5,op:1,shp:'rect',shpF:false,stab:false,pres:true,layers:[],aL:0,us:[],rs:[],mU:30,drw:false,lx:0,ly:0,ex:0,ey:0,pts:[],sticker:null};
const PAL=['#333333','#666666','#999999','#CCCCCC','#FFFFFF','#FF0000','#FF4444','#FF6B6B','#FF8888','#FFAAAA','#FF6600','#FF8833','#FFAA55','#FFCC88','#FFEEBB','#FFCC00','#FFDD33','#FFEE66','#FFFF99','#FFFFCC','#33CC00','#55DD33','#77EE55','#99FF88','#BBFFAA','#0099FF','#33AAFF','#55BBFF','#88CCFF','#AADDFF','#6633FF','#8855FF','#AA77FF','#CC99FF','#DDBBFF','#FF33CC','#FF55DD','#FF77EE','#FF99FF','#FFBBFF','#8B4513','#A0522D','#CD853F','#DEB887','#F5DEB3','#FF6B9D','#C084FC','#7DD3FC','#6EE7B7','#FDE68A'];
const TLS=[['pen','✏️','ペン'],['marker','🖊️','マーカー'],['watercolor','🎨','水彩'],['crayon','🖍️','クレヨン'],['airbrush','💨','エアブラシ'],['neon','💡','ネオン'],['_'],['eraser','🧹','消しゴム'],['shape','🔷','図形'],['fill','🪣','塗りつぶし'],['eyedropper','💧','スポイト'],['smudge','🌊','ぼかし'],['sparkle','✨','キラキラ']];
const STK={Nature:'🌸🌺🌻🌷🌹🌼🍀🌿🌳🌴🌵🍁💐🌊',Animals:'🐱🐶🐰🐻🐼🦊🐸🐧🦋🐝🐞🐠🐬🦄🐣🐾',Food:'🍰🧁🍩🍪🍭🍬🍓🍒🍑🍦🎂🍫🍡🧋☕🍮',Cute:'💖💕💗💝💘💓🎀🎁🎈🎊🎉🎶🎵🌈🦋👑',Deco:'⭐✨💫🌟⚡🔥❄️🌙☀️🌠💎🔮🎪🏰🎡🎠',Faces:'😊😍🥰😘😜🤗😺😸🥺🤩😇🥳🤭😻💀👻'};
const BRS=[['pen','✏️','ペン'],['marker','🖊️','マーカー'],['watercolor','🎨','水彩'],['crayon','🖍️','クレヨン'],['airbrush','💨','エアブラシ'],['neon','💡','ネオン'],['calligraphy','🪶','カリグラフィ'],['pixel','👾','ピクセル'],['ribbon','🎀','リボン']];
const SHP=[['rect','⬜','四角'],['circle','⭕','丸'],['triangle','🔺','三角'],['star','⭐','星'],['heart','💖','ハート'],['line','➖','直線'],['arrow','➡️','矢印'],['diamond','💎','ダイヤ']];

const wrap=document.getElementById('canvas-wrap');
const mC=document.getElementById('mainCanvas'),bC=document.getElementById('bgCanvas'),pC=document.getElementById('prevCanvas');
const mX=mC.getContext('2d'),bX=bC.getContext('2d'),pX=pC.getContext('2d');
let W=0,H=0,D=1;

function rsz(){const r=wrap.getBoundingClientRect();W=r.width;H=r.height;D=devicePixelRatio||1;[mC,bC,pC].forEach(c=>{c.style.width=W+'px';c.style.height=H+'px';c.width=Math.round(W*D);c.height=Math.round(H*D);c.getContext('2d').setTransform(D,0,0,D,0,0)});bX.fillStyle='#FFF';bX.fillRect(0,0,W,H);if(!S.layers.length)addL();else rdr()}

function addL(){const c=document.createElement('canvas');c.width=Math.round(W*D);c.height=Math.round(H*D);const x=c.getContext('2d');x.setTransform(D,0,0,D,0,0);S.layers.push({c,x,nm:'レイヤー'+(S.layers.length+1),v:true,o:1});S.aL=S.layers.length-1;rlp();rdr()}
function rmL(i){if(S.layers.length<2)return;S.layers.splice(i,1);if(S.aL>=S.layers.length)S.aL--;rlp();rdr()}
function rdr(){mX.clearRect(0,0,W,H);for(const l of S.layers){if(!l.v)continue;mX.globalAlpha=l.o;mX.drawImage(l.c,0,0,l.c.width,l.c.height,0,0,W,H)}mX.globalAlpha=1}
function ax(){return S.layers.length?S.layers[S.aL].x:null}
function rlp(){
  const el=document.getElementById('lList');el.innerHTML='';
  for(let i=S.layers.length-1;i>=0;i--){const l=S.layers[i],d=document.createElement('div');d.className='li'+(i===S.aL?' on':'');
  d.innerHTML='<div class="lt"><canvas width="44" height="32"></canvas></div><div style="flex:1;font-weight:700;font-size:12px">'+l.nm+'</div><div class="lbtns"><button data-a="v">'+( l.v?'👁️':'🚫')+'</button><button data-a="d">⬇️</button><button data-a="u">⬆️</button><button data-a="x">🗑️</button></div>';
  const idx=i;d.addEventListener('click',e=>{if(e.target.closest('.lbtns'))return;S.aL=idx;rlp()});el.appendChild(d);
  d.querySelector('.lt canvas').getContext('2d').drawImage(l.c,0,0,l.c.width,l.c.height,0,0,44,32);
  d.querySelectorAll('.lbtns button').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();const a=b.dataset.a;a==='v'?(l.v=!l.v,rlp(),rdr()):a==='d'?mvL(idx,-1):a==='u'?mvL(idx,1):rmL(idx)}))}
}
function mvL(i,d){const n=i+d;if(n<0||n>=S.layers.length)return;[S.layers[i],S.layers[n]]=[S.layers[n],S.layers[i]];if(S.aL===i)S.aL=n;else if(S.aL===n)S.aL=i;rlp();rdr()}

function snp(){return S.layers.map(l=>{const c=document.createElement('canvas');c.width=l.c.width;c.height=l.c.height;c.getContext('2d').drawImage(l.c,0,0);return{d:c,nm:l.nm,v:l.v,o:l.o}})}
function sav(){S.us.push({l:snp(),a:S.aL});if(S.us.length>S.mU)S.us.shift();S.rs=[]}
function rst(s){S.layers=s.l.map(x=>{const c=document.createElement('canvas');c.width=x.d.width;c.height=x.d.height;const ctx=c.getContext('2d');ctx.drawImage(x.d,0,0);ctx.setTransform(D,0,0,D,0,0);return{c,x:ctx,nm:x.nm,v:x.v,o:x.o}});S.aL=s.a;rdr();rlp()}
function undo(){if(!S.us.length)return;S.rs.push({l:snp(),a:S.aL});rst(S.us.pop());msg('↩️ 元に戻しました')}
function redo(){if(!S.rs.length)return;S.us.push({l:snp(),a:S.aL});rst(S.rs.pop());msg('↪️ やり直しました')}

function gp(e){const r=mC.getBoundingClientRect();let x,y;if(e.touches&&e.touches.length){x=e.touches[0].clientX;y=e.touches[0].clientY}else if(e.changedTouches&&e.changedTouches.length){x=e.changedTouches[0].clientX;y=e.changedTouches[0].clientY}else{x=e.clientX;y=e.clientY}return{x:x-r.left,y:y-r.top,p:e.pressure>0?e.pressure:.5}}

function dStart(e){e.preventDefault();e.stopPropagation();
  if(S.tool==='eyedropper'){eyedrop(e);return}if(S.sticker){stamp(e);return}if(S.tool==='fill'){flood(e);return}
  S.drw=true;const p=gp(e);S.lx=p.x;S.ly=p.y;S.ex=p.x;S.ey=p.y;S.pts=[p];sav();
  if(S.tool!=='shape'){seg(p.x,p.y,p.x,p.y,p.p);rdr()}}
function dMove(e){e.preventDefault();e.stopPropagation();if(!S.drw)return;const p=gp(e);S.ex=p.x;S.ey=p.y;
  if(S.tool==='shape'){pX.clearRect(0,0,W,H);shOn(pX,S.pts[0],p);return}
  if(S.stab&&S.pts.length>=2){const s={x:p.x*.4+S.pts[S.pts.length-1].x*.6,y:p.y*.4+S.pts[S.pts.length-1].y*.6,p:p.p};seg(S.lx,S.ly,s.x,s.y,s.p);S.lx=s.x;S.ly=s.y;S.pts.push(s)}
  else{seg(S.lx,S.ly,p.x,p.y,p.p);S.lx=p.x;S.ly=p.y;S.pts.push(p)}rdr()}
function dEnd(e){if(!S.drw)return;e.preventDefault();S.drw=false;
  if(S.tool==='shape'&&S.pts.length){const c=ax();if(c)shOn(c,S.pts[0],{x:S.ex,y:S.ey});pX.clearRect(0,0,W,H);rdr()}S.pts=[];rlp()}

function seg(x1,y1,x2,y2,pr){const c=ax();if(!c)return;const sz=S.pres?S.sz*(.3+pr*.7):S.sz,al=S.op;c.save();c.lineCap='round';c.lineJoin='round';
switch(S.tool){
case'pen':c.globalAlpha=al;c.strokeStyle=S.col;c.lineWidth=sz;c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();break;
case'marker':c.globalAlpha=al*.6;c.strokeStyle=S.col;c.lineWidth=sz*2;c.globalCompositeOperation='multiply';c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();break;
case'watercolor':{c.globalAlpha=al*.12;c.fillStyle=S.col;const d=Math.hypot(x2-x1,y2-y1),st=Math.max(1,d/2|0);for(let i=0;i<=st;i++){const t=i/st,x=x1+(x2-x1)*t,y=y1+(y2-y1)*t;for(let j=0;j<3;j++){c.beginPath();c.arc(x+(Math.random()-.5)*sz,y+(Math.random()-.5)*sz,sz*(.5+Math.random()*.5),0,Math.PI*2);c.fill()}}break}
case'crayon':{c.strokeStyle=S.col;c.lineWidth=sz;const d=Math.hypot(x2-x1,y2-y1),st=Math.max(1,d|0);for(let i=0;i<st;i++){const t=i/st;c.globalAlpha=al*(.3+Math.random()*.5);c.beginPath();c.moveTo(x1+(x2-x1)*t+(Math.random()-.5)*sz*.3,y1+(y2-y1)*t+(Math.random()-.5)*sz*.3);c.lineTo(x1+(x2-x1)*(t+1/st)+(Math.random()-.5)*sz*.3,y1+(y2-y1)*(t+1/st)+(Math.random()-.5)*sz*.3);c.stroke()}break}
case'airbrush':{c.fillStyle=S.col;const d=Math.hypot(x2-x1,y2-y1),st=Math.max(1,d/2|0);for(let i=0;i<=st;i++){const t=i/st,x=x1+(x2-x1)*t,y=y1+(y2-y1)*t;for(let j=0;j<8;j++){const a=Math.random()*Math.PI*2,r=Math.random()*sz;c.globalAlpha=al*(1-r/sz)*.1;c.beginPath();c.arc(x+Math.cos(a)*r,y+Math.sin(a)*r,1,0,Math.PI*2);c.fill()}}break}
case'neon':c.shadowColor=S.col;c.shadowBlur=sz*2;c.globalAlpha=al;c.strokeStyle='#FFF';c.lineWidth=sz*.5;c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();c.strokeStyle=S.col;c.lineWidth=sz;c.globalAlpha=al*.5;c.shadowBlur=sz*4;c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();break;
case'eraser':c.globalCompositeOperation='destination-out';c.globalAlpha=1;c.lineWidth=sz*2;c.strokeStyle='#000';c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();break;
case'smudge':{const d=Math.hypot(x2-x1,y2-y1);if(d<1)break;const lc=S.layers[S.aL].c;for(let i=0;i<=Math.max(1,d/3|0);i++){const t=i/Math.max(1,d/3|0),x=x1+(x2-x1)*t,y=y1+(y2-y1)*t,r=sz*1.5;const sx=Math.max(0,Math.round((x-r)*D)),sy=Math.max(0,Math.round((y-r)*D)),sw=Math.min(Math.round(r*2*D),lc.width-sx),sh=Math.min(Math.round(r*2*D),lc.height-sy);if(sw>0&&sh>0)try{const id=c.getImageData(sx,sy,sw,sh);c.putImageData(id,Math.round(sx+(x2-x1)/d*.5*D),Math.round(sy+(y2-y1)/d*.5*D))}catch(e){}}break}
case'sparkle':{c.globalAlpha=al;const d=Math.hypot(x2-x1,y2-y1),st=Math.max(1,d/4|0);for(let i=0;i<=st;i++){const t=i/st,x=x1+(x2-x1)*t,y=y1+(y2-y1)*t;if(Math.random()>.5){const cs=['#FFD700','#FF69B4','#00CED1','#FF6347','#ADFF2F','#FFF'];c.fillStyle=cs[Math.random()*6|0];c.save();c.translate(x+(Math.random()-.5)*sz*2,y+(Math.random()-.5)*sz*2);c.rotate(Math.random()*Math.PI);const R=sz*(.5+Math.random());c.beginPath();for(let j=0;j<4;j++){const a=j/4*Math.PI*2-Math.PI/2,a2=(j+.5)/4*Math.PI*2-Math.PI/2;c.lineTo(Math.cos(a)*R,Math.sin(a)*R);c.lineTo(Math.cos(a2)*R*.3,Math.sin(a2)*R*.3)}c.closePath();c.fill();c.restore()}}break}
case'calligraphy':{c.globalAlpha=al;c.strokeStyle=S.col;c.lineWidth=sz*(.3+Math.abs(Math.sin(Math.atan2(y2-y1,x2-x1)))*.7);c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();break}
case'pixel':{c.globalAlpha=al;c.fillStyle=S.col;const p=Math.max(2,sz/2|0);c.fillRect(Math.floor(x2/p)*p,Math.floor(y2/p)*p,p,p);break}
case'ribbon':{c.globalAlpha=al;c.strokeStyle=S.col;c.lineWidth=sz;const w=Math.sin(Date.now()/500+x2*.05)*sz;c.beginPath();c.moveTo(x1,y1);c.quadraticCurveTo((x1+x2)/2,(y1+y2)/2+w,x2,y2);c.stroke();break}
}c.restore()}

function shOn(c,s,e){c.save();c.strokeStyle=S.col;c.fillStyle=S.col;c.lineWidth=S.sz;c.globalAlpha=S.op;c.lineCap='round';c.lineJoin='round';const x=Math.min(s.x,e.x),y=Math.min(s.y,e.y),w=Math.abs(e.x-s.x),h=Math.abs(e.y-s.y),cx=(s.x+e.x)/2,cy=(s.y+e.y)/2;c.beginPath();
switch(S.shp){case'rect':S.shpF?c.fillRect(x,y,w,h):c.strokeRect(x,y,w,h);break;case'circle':c.ellipse(cx,cy,w/2||1,h/2||1,0,0,Math.PI*2);S.shpF?c.fill():c.stroke();break;case'triangle':c.moveTo(cx,y);c.lineTo(x,y+h);c.lineTo(x+w,y+h);c.closePath();S.shpF?c.fill():c.stroke();break;
case'star':{let rot=-Math.PI/2;const R=Math.min(w,h)/2,r=R/2;c.moveTo(cx+Math.cos(rot)*R,cy+Math.sin(rot)*R);for(let i=0;i<5;i++){c.lineTo(cx+Math.cos(rot)*R,cy+Math.sin(rot)*R);rot+=Math.PI/5;c.lineTo(cx+Math.cos(rot)*r,cy+Math.sin(rot)*r);rot+=Math.PI/5}c.closePath();S.shpF?c.fill():c.stroke();break}
case'heart':{const ss=Math.min(w,h)/2;c.moveTo(cx,cy+ss*.4);c.bezierCurveTo(cx,cy-ss*.2,cx-ss,cy-ss*.5,cx-ss,cy+ss*.05);c.bezierCurveTo(cx-ss,cy+ss*.5,cx,cy+ss*.7,cx,cy+ss);c.bezierCurveTo(cx,cy+ss*.7,cx+ss,cy+ss*.5,cx+ss,cy+ss*.05);c.bezierCurveTo(cx+ss,cy-ss*.5,cx,cy-ss*.2,cx,cy+ss*.4);S.shpF?c.fill():c.stroke();break}
case'line':c.moveTo(s.x,s.y);c.lineTo(e.x,e.y);c.stroke();break;
case'arrow':{const a=Math.atan2(e.y-s.y,e.x-s.x),hs=S.sz*3;c.moveTo(s.x,s.y);c.lineTo(e.x,e.y);c.stroke();c.beginPath();c.moveTo(e.x,e.y);c.lineTo(e.x-hs*Math.cos(a-Math.PI/6),e.y-hs*Math.sin(a-Math.PI/6));c.lineTo(e.x-hs*Math.cos(a+Math.PI/6),e.y-hs*Math.sin(a+Math.PI/6));c.closePath();c.fill();break}
case'diamond':c.moveTo(cx,y);c.lineTo(x+w,cy);c.lineTo(cx,y+h);c.lineTo(x,cy);c.closePath();S.shpF?c.fill():c.stroke();break}
c.restore()}

function flood(e){sav();const p=gp(e),c=ax();if(!c)return;const lc=S.layers[S.aL].c,PX=Math.floor(p.x*D),PY=Math.floor(p.y*D),FW=lc.width,FH=lc.height;if(PX<0||PY<0||PX>=FW||PY>=FH)return;const id=c.getImageData(0,0,FW,FH),d=id.data,ti=(PY*FW+PX)*4,tR=d[ti],tG=d[ti+1],tB=d[ti+2],tA=d[ti+3],fc=h2r(S.col),fA=Math.round(S.op*255);if(tR===fc.r&&tG===fc.g&&tB===fc.b&&tA===fA)return;const tol=30,sk=[[PX,PY]],vis=new Uint8Array(FW*FH);while(sk.length){const[cx,cy]=sk.pop(),idx=cy*FW+cx;if(cx<0||cx>=FW||cy<0||cy>=FH||vis[idx])continue;const pi=idx*4;if(Math.abs(d[pi]-tR)>tol||Math.abs(d[pi+1]-tG)>tol||Math.abs(d[pi+2]-tB)>tol||Math.abs(d[pi+3]-tA)>tol)continue;vis[idx]=1;d[pi]=fc.r;d[pi+1]=fc.g;d[pi+2]=fc.b;d[pi+3]=fA;sk.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1])}c.putImageData(id,0,0);rdr();msg('🪣 塗りつぶし完了！')}

// =============================================
// CUSTOM SLIDER - iOS IFRAME SAFE
// Key: iOS sends touchmove to the SAME element
// that received touchstart, so we only need
// listeners on the slider element itself.
// =============================================
function mkSlider(id, min, max, initVal, onChange) {
  var el = document.getElementById(id);
  var fill = el.querySelector('.fill');
  var knob = el.querySelector('.knob');
  var dragging = false;

  function set(v) {
    v = Math.round(Math.max(min, Math.min(max, v)));
    var pct = (v - min) / (max - min) * 100;
    fill.style.width = pct + '%';
    knob.style.left = pct + '%';
    onChange(v);
  }

  function xToVal(clientX) {
    var rect = el.getBoundingClientRect();
    var ratio = (clientX - rect.left) / rect.width;
    ratio = Math.max(0, Math.min(1, ratio));
    return min + ratio * (max - min);
  }

  el.addEventListener('touchstart', function(ev) {
    ev.preventDefault();
    ev.stopPropagation();
    dragging = true;
    el.classList.add('act');
    set(xToVal(ev.touches[0].clientX));
  }, {passive: false});

  el.addEventListener('touchmove', function(ev) {
    if (!dragging) return;
    ev.preventDefault();
    ev.stopPropagation();
    set(xToVal(ev.touches[0].clientX));
  }, {passive: false});

  el.addEventListener('touchend', function(ev) {
    ev.preventDefault();
    ev.stopPropagation();
    dragging = false;
    el.classList.remove('act');
  }, {passive: false});

  el.addEventListener('touchcancel', function() {
    dragging = false;
    el.classList.remove('act');
  });

  el.addEventListener('mousedown', function(ev) {
    ev.preventDefault();
    dragging = true;
    el.classList.add('act');
    set(xToVal(ev.clientX));
    function mm(e2) { if (dragging) set(xToVal(e2.clientX)); }
    function mu() { dragging = false; el.classList.remove('act'); window.removeEventListener('mousemove', mm); window.removeEventListener('mouseup', mu); }
    window.addEventListener('mousemove', mm);
    window.addEventListener('mouseup', mu);
  });

  set(initVal);
}
